name: 🚀 Build_imm_高通410系列_多线程

on:
  repository_dispatch:
  workflow_dispatch:
    inputs:
      ssh:
        description: ' ← 选择是否开启 SSH 调试专业人员使用'
        required: false
        default: false
        type: boolean
      profile:
        description: ' ↓ 支持多款型号 手动选择要编译的机型 ↓ '
        type: choice
        options:
          - ufi003
          - ufi001c
          - ufi001b
          - ufi103s
          - jz02v10
          - qrzl903
          - w001
          - uz801
          - mf32
          - mf601
          - wf2
          - sp970v11
          - sp970v10
        default: ufi003
        required: true
      upstream:
        description: ' ↓ 选择上游源码仓库 ↓ '
        type: choice
        options:
          - lkiuyu/immortalwrt
        default: lkiuyu/immortalwrt
        required: true
      extra_packages:
        description: ' ↓ 输入额外包名（逗号或空格分隔，留空则不添加任何额外包）↓ '
        required: false
        default: ''
        type: string
      multithreading:
        description: '开启多线程编译 (Enable multithreading build)'
        type: boolean
        default: true

env:
  REPO_BRANCH: master
  FEEDS_CONF: feeds.conf.default
  CONFIG_FILE: ${{ format('config/{0}.config', github.event.inputs.profile) }}
  DIY_P1_SH: diy-part1.sh
  DIY_P2_SH: diy-part2.sh
  UPLOAD_BIN_DIR: false
  UPLOAD_FIRMWARE: true
  UPLOAD_RELEASE: true
  TZ: Asia/Shanghai
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      actions: write
    name: 🚀 编译 (Build)
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Show hardware info
        run: |
          chmod 755 ./scripts/show_hardware_info.sh
          ./scripts/show_hardware_info.sh
    
      - name: Free Disk Space (Ubuntu)
        uses: jlumbroso/free-disk-space@main
        with:
          tool-cache: false
          android: false
          dotnet: false
          haskell: false
          large-packages: false
          docker-images: false
          swap-storage: true

      - name: 下载编译所需的依赖 (Install the software packages required for compilation)
        run: |
          sudo apt update
          sudo apt install -y ack antlr3 asciidoc autoconf automake autopoint binutils bison build-essential bzip2 ccache cmake cpio curl device-tree-compiler fastjar flex gawk gettext gcc-multilib g++-multilib git gperf haveged help2man intltool libc6-dev-i386 libelf-dev libfuse-dev libglib2.0-dev libgmp3-dev libltdl-dev libmpc-dev libmpfr-dev libncurses5-dev libncursesw5-dev libpython3-dev libreadline-dev libssl-dev libtool lrzsz mkisofs msmtp ninja-build p7zip p7zip-full patch pkgconf python3 python3-pyelftools python3-setuptools qemu-utils rsync scons squashfs-tools subversion swig texinfo uglifyjs upx-ucl unzip vim wget xmlto xxd zlib1g-dev
          sudo timedatectl set-timezone "$TZ"

      - name: 读取锁定的上游 hash (Read locked upstream hash)
        id: lock
        run: |
          UPSTREAM=${{ github.event.inputs.upstream }}
          LOCK_FILE="upstream_lock.txt"
          if [ "$UPSTREAM" = "lkiuyu/immortalwrt" ] && [ -f "$LOCK_FILE" ]; then
            HASH=$(cat $LOCK_FILE)
            echo "use_hash=true" >> $GITHUB_OUTPUT
            echo "locked_hash=$HASH" >> $GITHUB_OUTPUT
            echo "使用锁定 hash: $HASH"
          else
            echo "use_hash=false" >> $GITHUB_OUTPUT
            echo "使用上游最新 master 分支"
          fi

      - name: 克隆 ImmortalWrt 仓库 (Clone ImmortalWrt repo)
        uses: actions/checkout@v4
        if: steps.lock.outputs.use_hash == 'false'
        with:
          repository: ${{ github.event.inputs.upstream }}
          ref: ${{ env.REPO_BRANCH }}
          path: openwrt

      - name: 克隆 ImmortalWrt 仓库 (锁定版本) (Clone ImmortalWrt repo locked)
        if: steps.lock.outputs.use_hash == 'true'
        run: |
          git clone https://github.com/${{ github.event.inputs.upstream }} openwrt
          cd openwrt && git checkout ${{ steps.lock.outputs.locked_hash }}

      - name: 复制配置文件 (Copy config files)
        run: |
          [ -e files ] && cp -r files openwrt/files
          [ -e $FEEDS_CONF ] && cp $FEEDS_CONF openwrt/feeds.conf.default
          [ -e $CONFIG_FILE ] && cp $CONFIG_FILE openwrt/.config

      - name: 运行 diy-part1.sh (Run diy-part1.sh)
        run: |
          chmod +x $DIY_P1_SH
          cd openwrt
          $GITHUB_WORKSPACE/$DIY_P1_SH

      - name: 更新并下载 feeds (Update and download feeds)
        working-directory: openwrt
        run: ./scripts/feeds update -a

      - name: 删除冲突包 (Remove conflicting packages)
        run: |
          rm -rf openwrt/feeds/smpackage/{base-files,dnsmasq,firewall*,fullconenat,libnftnl,nftables,ppp,opkg,ucl,upx,vsftpd*,miniupnpd-iptables,wireless-regdb}

      - name: 安装 feeds (Install feeds)
        working-directory: openwrt
        run: ./scripts/feeds install -a -f

      - name: 运行 diy-part2.sh (Run diy-part2.sh)
        run: |
          chmod +x $DIY_P2_SH
          cd openwrt
          $GITHUB_WORKSPACE/$DIY_P2_SH

      - name: 安装额外包 (Install extra packages)
        if: ${{ inputs.extra_packages != '' }}
        run: |
          cd openwrt
          echo "=========================================="
          echo "用户请求的额外包:"
          echo "${{ inputs.extra_packages }}"
          echo "=========================================="
          # 支持逗号或空格分隔，先把逗号替换为空格
          PACKAGES=$(echo '${{ inputs.extra_packages }}' | sed 's/,/ /g')
          for pkg in $PACKAGES; do
            if [ -n "$pkg" ]; then
              echo "添加包到 .config: CONFIG_PACKAGE_$pkg=y"
              echo "CONFIG_PACKAGE_$pkg=y" >> .config
            fi
          done

      - name: SSH 调试有效时间6h! 连接后输入q 输入exit即可退出，自动继续后续编译流程
        uses: mxschmitt/action-tmate@master
        if: ${{ inputs.ssh || contains(github.event.action, 'ssh') }}

      - name: 生成配置 (Generate config)
        working-directory: openwrt
        run: make defconfig

      - name: 下载包 (Download packages)
        working-directory: openwrt
        run: |
          make download -j4 V=s
          find dl -size -1024c -exec ls -l {} \;
          find dl -size -1024c -exec rm -f {} \;

      - name: 编译前上传配置 (Upload config before build)
        uses: actions/upload-artifact@v4
        with:
          name: build-config
          path: |
            openwrt/feeds.conf.default
            openwrt/.config

      - name: 多线程编译 ImmortalWrt (Build ImmortalWrt multithreading)
        if: ${{inputs.multithreading == true}}
        working-directory: openwrt
        run: |
          echo -e "$(nproc) thread compile"
          make tools/install toolchain/install -j$(nproc)
          make package/feeds/packages/glib2/compile -j$(nproc)
          make package/feeds/packages/libmbim/compile -j$(nproc)
          make -j$(nproc) || make -j1 V=s
          grep '^CONFIG_TARGET.*DEVICE.*=y' .config | sed -r 's/.*DEVICE_(.*)=y/\1/' > DEVICE_NAME
          [ -s DEVICE_NAME ] && echo "DEVICE_NAME=_$(cat DEVICE_NAME)" >> $GITHUB_ENV
          echo "FILE_DATE=_$(date +"%Y%m%d%H%M")" >> $GITHUB_ENV

      - name: 单线程编译 ImmortalWrt (Build ImmortalWrt single thread)
        if: ${{inputs.multithreading == false}}
        working-directory: openwrt
        run: |
          make tools/install toolchain/install -j$(nproc)
          make package/feeds/packages/glib2/compile -j1
          make package/feeds/packages/libmbim/compile -j1
          make -j1 V=s
          grep '^CONFIG_TARGET.*DEVICE.*=y' .config | sed -r 's/.*DEVICE_(.*)=y/\1/' > DEVICE_NAME
          [ -s DEVICE_NAME ] && echo "DEVICE_NAME=_$(cat DEVICE_NAME)" >> $GITHUB_ENV
          echo "FILE_DATE=_$(date +"%Y%m%d%H%M")" >> $GITHUB_ENV

      - name: 获取内核版本 (Get kernel version)
        run: |
          KERNEL_VER=$(cat openwrt/build_dir/target-*/linux-*/linux-*/.kernelversion 2>/dev/null | head -1 || echo "未知")
          echo "KERNEL_VER=$KERNEL_VER" >> $GITHUB_ENV

      - name: 整理文件 (Organize files)
        id: organize
        if: env.UPLOAD_FIRMWARE == 'true' && !cancelled()
        run: |
          cd openwrt/bin/targets/*/*
          rm -rf packages
          PROFILE=${{ github.event.inputs.profile }}

          # 创建刷机包目录并打包 zip
          mkdir -p flash_package
          BOOT_IMG=$(ls *boot.img.gz *boot.img 2>/dev/null | head -1)
          SYSTEM_IMG=$(ls *system.img.gz *system.img 2>/dev/null | head -1)
          if [ -z "$BOOT_IMG" ] || [ -z "$SYSTEM_IMG" ]; then
            echo "::error::固件文件未找到，编译可能失败！当前目录文件："
            ls -la
            exit 1
          fi
          cp "$BOOT_IMG" flash_package/boot.img.gz
          cp "$SYSTEM_IMG" flash_package/system.img.gz
          # 解压供刷机脚本使用
          gzip -dk flash_package/boot.img.gz
          gzip -dk flash_package/system.img.gz
          rm flash_package/boot.img.gz flash_package/system.img.gz
          cp -r $GITHUB_WORKSPACE/刷机脚本/. flash_package/
          # 确保 bat 文件是 CRLF 换行（Windows 兼容）
          unix2dos flash_package/*.bat 2>/dev/null || sed -i 's/\r//' flash_package/*.bat && sed -i 's/$/\r/' flash_package/*.bat
          ZIP_NAME="OpenWrt_${PROFILE}${{ env.FILE_DATE }}_刷机包.zip"
          cd flash_package && zip -r "../$ZIP_NAME" . && cd ..

          # 整理 release 目录：zip + 单独固件 + 编译信息
          mkdir -p release_files
          mv "$ZIP_NAME" release_files/
          cp *.manifest release_files/ 2>/dev/null || true
          cp *.buildinfo release_files/ 2>/dev/null || true
          cp sha256sums release_files/ 2>/dev/null || true

          echo "FIRMWARE=$PWD/release_files" >> $GITHUB_ENV
          echo "status=success" >> $GITHUB_OUTPUT

      - name: 上传编译结果到 Artifact (Upload build result to Artifact)
        uses: actions/upload-artifact@v4
        if: steps.organize.outputs.status == 'success' && !cancelled()
        with:
          name: OpenWrt_firmware${{ env.DEVICE_NAME }}${{ env.FILE_DATE }}
          path: ${{ env.FIRMWARE }}

      - name: 生成发布标签 (Generate release tag)
        id: tag
        if: env.UPLOAD_RELEASE == 'true' && !cancelled()
        run: |
          PROFILE=${{ github.event.inputs.profile }}
          echo "release_tag=$(date +"%Y.%m.%d-%H%M")-${PROFILE}" >> $GITHUB_OUTPUT
          touch release.txt
          {
            echo "## Immortalwrt master分支 高通410系列 · ${PROFILE}"
            echo ""
            echo "| 项目 | 信息 |"
            echo "|------|------|"
            echo "| 编译者 | ${{ github.actor }} |"
            echo "| 机型 | ${PROFILE} |"
            echo "| 内核版本 | ${{ env.KERNEL_VER }} |"
            echo "| 管理地址 | 192.168.1.1 |"
            echo "| 默认用户 | root |"
            echo "| 默认密码 | 空 |"
            echo ""
            # 额外包
            EXTRA=$(echo '${{ inputs.extra_packages }}' | sed 's/,/ /g' | tr ' ' '\n' | sed '/^$/d')
            if [ -n "$EXTRA" ]; then
              echo "### 额外添加的包"
              echo "$EXTRA" | sed 's/^/- /'
            else
              echo "### 额外添加的包"
              echo "无"
            fi
          } >> release.txt
          echo "status=success" >> $GITHUB_OUTPUT

      - name: 上传固件到发布 (Upload firmware to release)
        if: env.UPLOAD_RELEASE == 'true' && steps.organize.outputs.status == 'success'
        uses: ncipollo/release-action@main
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag: ${{ steps.tag.outputs.release_tag }}
          bodyFile: release.txt
          artifacts: ${{ env.FIRMWARE }}/**/*
          artifactErrorsFailBuild: false
          allowUpdates: true
          draft: false
          prerelease: false

      - name: 删除旧的工作流运行 (Delete old workflow runs)
        if: always()
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          RETAIN_DAYS: 7
          KEEP_MINIMUM_RUNS: 5
        run: |
          RUNS=$(curl -s -H "Authorization: token $GITHUB_TOKEN" \
            "https://api.github.com/repos/${{ github.repository }}/actions/runs?per_page=100")
          CUTOFF=$(date -d "-${RETAIN_DAYS} days" +%s)
          DEL_IDS=$(echo "$RUNS" | jq -r --arg cutoff "$CUTOFF" --argjson keep "$KEEP_MINIMUM_RUNS" '
            [.workflow_runs[]
              | select((now - (.created_at | fromdateiso8601)) > ($cutoff | tonumber))
              | {id, created_at}
            ]
            | sort_by(.created_at)
            | .[:-$keep]
            | .[].id
          ')
          if [[ -z "$DEL_IDS" ]]; then
            echo "No old runs to delete."
          else
            echo "$DEL_IDS" | while read run_id; do
              echo "Deleting run $run_id"
              curl -X DELETE -H "Authorization: token $GITHUB_TOKEN" \
                "https://api.github.com/repos/${{ github.repository }}/actions/runs/$run_id"
            done
          fi