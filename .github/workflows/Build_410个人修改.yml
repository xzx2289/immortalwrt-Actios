name: Build_imm_高通410系列_个人修改_no_modem

'on':
  repository_dispatch:
  workflow_dispatch:
    inputs:
      ssh:
        description: '是否开启 SSH 调试'
        required: false
        default: false
        type: boolean
      profile:
        description: '选择要编译的 410 随身 WiFi 机型'
        type: choice
        options:
          - ufi003
          - ufi001c
          - ufi001b
          - ufi103s
          - jz02v10
          - qrzl903
          - w001
          - uz801
          - mf32
          - mf601
          - wf2
          - sp970v11
          - sp970v10
        default: ufi003
        required: true
      upstream:
        description: '选择上游源码仓库'
        type: choice
        options:
          - lkiuyu/immortalwrt
          - xuxin1955/immortalwrt
        default: lkiuyu/immortalwrt
        required: true
      extra_packages:
        description: '额外包名，逗号或空格分隔；不要填 modem/qmi/mbim/wwan/rmtfs 相关包'
        required: false
        default: ''
        type: string

env:
  PROFILE: ${{ github.event.inputs.profile || 'ufi003' }}
  UPSTREAM: ${{ github.event.inputs.upstream || 'lkiuyu/immortalwrt' }}
  REPO_BRANCH: master
  FEEDS_CONF: feeds.conf.default
  DIY_P1_SH: diy-part1.sh
  DIY_P2_SH: diy-part2.sh
  UPLOAD_BIN_DIR: false
  UPLOAD_FIRMWARE: true
  UPLOAD_RELEASE: true
  TZ: Asia/Shanghai
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      actions: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Show hardware info
        run: |
          if [ -f ./scripts/show_hardware_info.sh ]; then
            chmod 755 ./scripts/show_hardware_info.sh
            ./scripts/show_hardware_info.sh
          else
            echo "scripts/show_hardware_info.sh not found, skip."
          fi

      - name: Free disk space
        uses: jlumbroso/free-disk-space@main
        with:
          tool-cache: false
          android: false
          dotnet: false
          haskell: false
          large-packages: false
          docker-images: false
          swap-storage: true

      - name: Initialization environment
        env:
          DEBIAN_FRONTEND: noninteractive
        run: |
          sudo -E apt-get -y update
          sudo -E apt-get -y install \
            $(curl -fsSL https://raw.githubusercontent.com/xuxin1955/depend_ubuntu2204_openwrt/refs/heads/main/depend_ubuntu2204_openwrt)
          sudo -E apt-get -y install python3 python3-pip jq zip unzip gzip curl wget git rsync
          sudo timedatectl set-timezone "$TZ"
          sudo chmod 777 /mnt
          df -hT

      - name: Install Android image tools
        run: |
          wget -O /tmp/mkbootimg.deb \
            https://github.com/xuxin1955/depend_ubuntu2204_openwrt/releases/download/ubuntu_26.04_LTS_mkbootimg/mkbootimg_34.0.5-12build1_all.deb
          sudo dpkg -i /tmp/mkbootimg.deb || sudo apt-get install -f -y
          sudo apt-get update
          sudo apt-get install -y android-sdk-libsparse-utils || true
          command -v mkbootimg || true
          command -v img2simg || true

      - name: Clone source code
        working-directory: /mnt
        run: |
          REPO_URL="https://github.com/${UPSTREAM}"
          echo "Clone source: $REPO_URL branch=$REPO_BRANCH"
          rm -rf /mnt/openwrt
          git clone "$REPO_URL" -b "$REPO_BRANCH" openwrt
          ln -sfn /mnt/openwrt "$GITHUB_WORKSPACE/openwrt"

      - name: Copy custom files
        run: |
          if [ -d "$GITHUB_WORKSPACE/files" ]; then
            mkdir -p "$GITHUB_WORKSPACE/openwrt/files"
            cp -rf "$GITHUB_WORKSPACE/files/." "$GITHUB_WORKSPACE/openwrt/files/"
          fi

      - name: Load custom feeds and patch DTS before feeds update
        run: |
          if [ -f "$GITHUB_WORKSPACE/$FEEDS_CONF" ]; then
            cp -f "$GITHUB_WORKSPACE/$FEEDS_CONF" "$GITHUB_WORKSPACE/openwrt/feeds.conf.default"
          fi

          if [ -f "$GITHUB_WORKSPACE/$DIY_P1_SH" ]; then
            chmod +x "$GITHUB_WORKSPACE/$DIY_P1_SH"
            cd "$GITHUB_WORKSPACE/openwrt"
            "$GITHUB_WORKSPACE/$DIY_P1_SH"
          else
            echo "ERROR: $DIY_P1_SH not found."
            exit 1
          fi

      - name: Update feeds
        run: |
          cd "$GITHUB_WORKSPACE/openwrt"
          ./scripts/feeds clean || true
          rm -rf feeds
          ./scripts/feeds update -a

      - name: Remove conflicting and modem package sources
        run: |
          cd "$GITHUB_WORKSPACE/openwrt"

          rm -rf feeds/smpackage/{base-files,dnsmasq,firewall*,fullconenat,libnftnl,nftables,ppp,opkg,ucl,upx,vsftpd*,miniupnpd-iptables,wireless-regdb} 2>/dev/null || true

          echo "===== Remove modem/QMI/MBIM/WWAN/rmtfs package source directories ====="
          for name in \
            qmi-modem-410-init \
            modemmanager modemmanager-rpcd \
            luci-app-modemmanager luci-proto-modemmanager \
            libqmi libqmi-glib qmi-utils qmi-utils-json uqmi luci-proto-qmi \
            libmbim libmbim-glib mbim-utils umbim luci-proto-mbim \
            libqrtr libqrtr-glib qrtr qrtr-ns \
            rmtfs wwan chat comgt comgt-ncm comgt-directip \
            DbusSmsForwardCPlus luci-app-dbus-sms-forward luci-app-sms-tool sms-tool
          do
            find package feeds -type d -name "$name" -prune -print -exec rm -rf {} + 2>/dev/null || true
          done

          find package feeds -type d -name 'qcom-msm8916-modem-openstick-*-firmware' -prune -print -exec rm -rf {} + 2>/dev/null || true

      - name: Install feeds
        run: |
          cd "$GITHUB_WORKSPACE/openwrt"
          ./scripts/feeds install -a -f

      - name: Load custom configuration
        run: |
          CONFIG_FILE="config/${PROFILE}.config"
          if [ -f "$GITHUB_WORKSPACE/$CONFIG_FILE" ]; then
            cp -f "$GITHUB_WORKSPACE/$CONFIG_FILE" "$GITHUB_WORKSPACE/openwrt/.config"
          else
            echo "ERROR: $CONFIG_FILE not found"
            exit 1
          fi

          if [ -d "$GITHUB_WORKSPACE/files" ]; then
            mkdir -p "$GITHUB_WORKSPACE/openwrt/files"
            cp -rf "$GITHUB_WORKSPACE/files/." "$GITHUB_WORKSPACE/openwrt/files/"
          fi

          if [ -f "$GITHUB_WORKSPACE/$DIY_P2_SH" ]; then
            chmod +x "$GITHUB_WORKSPACE/$DIY_P2_SH"
            cd "$GITHUB_WORKSPACE/openwrt"
            "$GITHUB_WORKSPACE/$DIY_P2_SH"
          else
            echo "ERROR: $DIY_P2_SH not found."
            exit 1
          fi

      - name: Install extra packages
        if: ${{ github.event.inputs.extra_packages != '' }}
        run: |
          cd "$GITHUB_WORKSPACE/openwrt"
          PACKAGES=$(echo '${{ github.event.inputs.extra_packages }}' | sed 's/,/ /g')
          FORBIDDEN_RE='(^|[[:space:]])(kmod-qcom-rproc-modem|kmod-rpmsg-wwan-ctrl|kmod-bam-dmux|rmtfs|qmi-modem-410-init|modemmanager|modemmanager-rpcd|luci-app-modemmanager|luci-proto-modemmanager|libqmi|libqmi-glib|qmi-utils|qmi-utils-json|uqmi|luci-proto-qmi|libmbim|libmbim-glib|mbim-utils|umbim|luci-proto-mbim|wwan|qrtr|qrtr-ns|libqrtr|libqrtr-glib|sms-tool|luci-app-sms-tool|DbusSmsForwardCPlus|luci-app-dbus-sms-forward|qcom-msm8916-modem-openstick-[^[:space:]]*-firmware)([[:space:]]|$)'
          if echo " $PACKAGES " | grep -Eq "$FORBIDDEN_RE"; then
            echo "ERROR: extra_packages 里包含 modem/qmi/mbim/wwan/rmtfs 相关包。"
            echo "你的输入: $PACKAGES"
            exit 1
          fi
          for pkg in $PACKAGES; do
            [ -n "$pkg" ] && echo "CONFIG_PACKAGE_$pkg=y" >> .config
          done

      - name: Force no-modem config before defconfig
        run: |
          cd "$GITHUB_WORKSPACE/openwrt"
          chmod +x "$GITHUB_WORKSPACE/scripts/cleanup-no-modem-config.sh"
          "$GITHUB_WORKSPACE/scripts/cleanup-no-modem-config.sh"

      - name: SSH debug
        uses: mxschmitt/action-tmate@master
        if: ${{ github.event.inputs.ssh == 'true' || github.event.inputs.ssh == true || contains(github.event.action, 'ssh') }}

      - name: Config defconfig
        id: config
        run: |
          cd "$GITHUB_WORKSPACE/openwrt"
          make defconfig

      - name: Final no-modem cleanup after defconfig
        run: |
          cd "$GITHUB_WORKSPACE/openwrt"
          chmod +x "$GITHUB_WORKSPACE/scripts/cleanup-no-modem-config.sh"
          "$GITHUB_WORKSPACE/scripts/cleanup-no-modem-config.sh"
          echo "===== Final no-modem related config ====="
          grep -Ei 'modem|mpss|qmi|mbim|wwan|rmtfs|wcnss|wcn36xx' .config || true

      - name: Verify no-modem config and DTS
        run: |
          cd "$GITHUB_WORKSPACE/openwrt"
          chmod +x "$GITHUB_WORKSPACE/scripts/verify-no-modem.sh"
          "$GITHUB_WORKSPACE/scripts/verify-no-modem.sh"

      - name: Cache dl
        id: cache-dl
        uses: actions/cache@v4
        with:
          path: openwrt/dl
          key: dl-${{ runner.os }}-${{ env.UPSTREAM }}-${{ hashFiles('openwrt/feeds.conf.default') }}
          restore-keys: |
            dl-${{ runner.os }}-${{ env.UPSTREAM }}-
            dl-${{ runner.os }}-

      - name: Download package
        id: package
        run: |
          cd "$GITHUB_WORKSPACE/openwrt"
          if [ "${{ steps.cache-dl.outputs.cache-hit }}" = "true" ]; then
            echo "dl cache hit"
          else
            echo "dl cache miss"
          fi
          make download -j4 V=s
          find dl -size -1024c -exec rm -f {} \;

      - name: Show openwrt directory
        run: |
          ls -la "$GITHUB_WORKSPACE/openwrt/"
          ls -l "$GITHUB_WORKSPACE/openwrt/.config"
          echo "===== Target device ====="
          grep '^CONFIG_TARGET.*DEVICE.*=y' "$GITHUB_WORKSPACE/openwrt/.config" || true
          echo "===== No-modem related config ====="
          grep -Ei 'modem|mpss|qmi|mbim|wwan|rmtfs|wcnss|wcn36xx' "$GITHUB_WORKSPACE/openwrt/.config" || true

      - name: Upload generated config
        uses: actions/upload-artifact@v4
        with:
          name: build-config-${{ env.PROFILE }}
          path: |
            ${{ github.workspace }}/openwrt/.config
            ${{ github.workspace }}/openwrt/feeds.conf.default
            ${{ github.workspace }}/openwrt/target/linux/msm89xx/dts/msm8916.dtsi
          include-hidden-files: true

      - name: Compile firmware
        id: compile
        run: |
          cd "$GITHUB_WORKSPACE/openwrt"
          echo "$(nproc) thread compile"
          make -j"$(nproc)" || make -j1 V=s
          echo "status=success" >> "$GITHUB_OUTPUT"
          grep '^CONFIG_TARGET.*DEVICE.*=y' .config | sed -r 's/.*DEVICE_(.*)=y/\1/' > DEVICE_NAME
          [ -s DEVICE_NAME ] && echo "DEVICE_NAME=_$(cat DEVICE_NAME)" >> "$GITHUB_ENV"
          echo "FILE_DATE=_$(date +"%Y%m%d%H%M")" >> "$GITHUB_ENV"

      - name: Get kernel version
        if: steps.compile.outputs.status == 'success'
        run: |
          KERNEL_VER=$(cat /mnt/openwrt/build_dir/target-*/linux-*/linux-*/.kernelversion 2>/dev/null | head -1 || echo "未知")
          echo "KERNEL_VER=$KERNEL_VER" >> "$GITHUB_ENV"

      - name: Upload bin directory
        uses: actions/upload-artifact@v4
        if: steps.compile.outputs.status == 'success' && env.UPLOAD_BIN_DIR == 'true'
        with:
          name: OpenWrt_bin${{ env.DEVICE_NAME }}${{ env.FILE_DATE }}
          path: openwrt/bin

      - name: Organize files
        id: organize
        if: env.UPLOAD_FIRMWARE == 'true' && steps.compile.outputs.status == 'success' && !cancelled()
        run: |
          cd "$GITHUB_WORKSPACE/openwrt/bin/targets/"*/*
          rm -rf packages
          PROFILE="${PROFILE}"
          mkdir -p flash_package
          BOOT_IMG=$(ls *boot.img.gz *boot.img 2>/dev/null | head -1 || true)
          SYSTEM_IMG=$(ls *system.img.gz *system.img 2>/dev/null | head -1 || true)
          if [ -z "$BOOT_IMG" ] || [ -z "$SYSTEM_IMG" ]; then
            echo "::error::固件文件未找到"
            ls -la
            exit 1
          fi
          cp "$BOOT_IMG" flash_package/boot.img.gz
          cp "$SYSTEM_IMG" flash_package/system.img.gz
          gzip -dk flash_package/boot.img.gz || true
          gzip -dk flash_package/system.img.gz || true
          rm -f flash_package/boot.img.gz flash_package/system.img.gz
          if [ -d "$GITHUB_WORKSPACE/刷机脚本" ]; then
            cp -r "$GITHUB_WORKSPACE/刷机脚本/." flash_package/
          fi
          ZIP_NAME="OpenWrt_${PROFILE}_nomodem${FILE_DATE}_刷机包.zip"
          cd flash_package
          zip -r "../$ZIP_NAME" .
          cd ..
          mkdir -p release_files
          mv "$ZIP_NAME" release_files/
          cp *.manifest release_files/ 2>/dev/null || true
          cp *.buildinfo release_files/ 2>/dev/null || true
          cp sha256sums release_files/ 2>/dev/null || true
          echo "FIRMWARE=$PWD/release_files" >> "$GITHUB_ENV"
          echo "status=success" >> "$GITHUB_OUTPUT"

      - name: Upload firmware directory
        uses: actions/upload-artifact@v4
        if: steps.organize.outputs.status == 'success' && !cancelled()
        with:
          name: OpenWrt_firmware${{ env.DEVICE_NAME }}_nomodem${{ env.FILE_DATE }}
          path: ${{ env.FIRMWARE }}

      - name: Generate release tag
        id: tag
        if: env.UPLOAD_RELEASE == 'true' && steps.organize.outputs.status == 'success' && !cancelled()
        run: |
          echo "release_tag=$(date +"%Y.%m.%d-%H%M")-${PROFILE}-nomodem" >> "$GITHUB_OUTPUT"
          touch release.txt
          {
            echo "## ImmortalWrt 高通410系列 no-modem · ${PROFILE}"
            echo ""
            echo "| 项目 | 信息 |"
            echo "|------|------|"
            echo "| 编译者 | ${{ github.actor }} |"
            echo "| 机型 | ${PROFILE} |"
            echo "| 上游源码 | ${UPSTREAM} |"
            echo "| 内核版本 | ${KERNEL_VER:-未知} |"
            echo "| no-modem | 已禁用 MPSS/modem 预留内存与 QMI/MBIM/WWAN/rmtfs 包 |"
            echo "| Wi-Fi/WCNSS | 保留 |"
            echo "| 管理地址 | 192.168.1.1 |"
            echo "| 默认用户 | root |"
            echo "| 默认密码 | 空 |"
          } >> release.txt
          echo "status=success" >> "$GITHUB_OUTPUT"

      - name: Upload firmware to release
        if: env.UPLOAD_RELEASE == 'true' && steps.organize.outputs.status == 'success'
        uses: ncipollo/release-action@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag: ${{ steps.tag.outputs.release_tag }}
          bodyFile: release.txt
          artifacts: ${{ env.FIRMWARE }}/**/*
          artifactErrorsFailBuild: false
          allowUpdates: true
          draft: false
          prerelease: false

      - name: Delete old workflow runs
        if: always()
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          RETAIN_DAYS: 7
          KEEP_MINIMUM_RUNS: 5
        run: |
          RUNS=$(curl -s -H "Authorization: token $GITHUB_TOKEN" \
            "https://api.github.com/repos/${{ github.repository }}/actions/runs?per_page=100")
          CUTOFF=$(date -d "-${RETAIN_DAYS} days" +%s)
          DEL_IDS=$(echo "$RUNS" | jq -r --arg cutoff "$CUTOFF" --argjson keep "$KEEP_MINIMUM_RUNS" '
            [.workflow_runs[]
             | select((now - (.created_at | fromdateiso8601)) > ($cutoff | tonumber))
             | {id, created_at}]
            | sort_by(.created_at)
            | .[:-$keep]
            | .[].id
          ')
          if [ -z "$DEL_IDS" ]; then
            echo "No old runs to delete."
          else
            echo "$DEL_IDS" | while read -r run_id; do
              [ -z "$run_id" ] && continue
              echo "Deleting run $run_id"
              curl -s -X DELETE -H "Authorization: token $GITHUB_TOKEN" \
                "https://api.github.com/repos/${{ github.repository }}/actions/runs/$run_id" || true
            done
          fi
